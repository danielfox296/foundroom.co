backend:
  name: github
  repo: danielfox296/foundroom.co
  branch: main
  auth_type: pkce
  app_id: YOUR_GITHUB_OAUTH_APP_CLIENT_ID


local_backend: false


media_folder: "assets/images"
public_folder: "/assets/images"


# Editor UI settings
editor:
  preview: false


collections:


  # ─── HOME PAGE ────────────────────────────────────────────────────────────────
  - name: "home"
    label: "Home Page"
    files:
      - label: "Hero — Founder story"
        name: "home-hero"
        file: "_src/pages/index/sections/01-hero.md"
        fields:
          - label: "Content"
            name: "body"
            widget: "markdown"
            modes: ["raw", "rich_text"]
            hint: "The two-column hero. Left column has the eyebrow, title, and tagline. Right column has the founder story paragraphs."


      - label: "What This Is"
        name: "home-what"
        file: "_src/pages/index/sections/02-what.md"
        fields:
          - label: "Content"
            name: "body"
