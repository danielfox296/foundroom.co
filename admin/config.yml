backend:
  name: github
  repo: danielfox296/foundroom.co
  branch: main

local_backend: false

media_folder: "assets/images"
public_folder: "/assets/images"

# Editor UI settings
editor:
  preview: false

collections:

  # ─── HOME PAGE ────────────────────────────────────────────────────────────────
  - name: "home"
    label: "Home Page"
    files:
      - label: "Hero — Founder story"
        name: "home-hero"
        file: "_src/pages/index/sections/01-hero.md"
        fields:
          - label: "Content"
            name: "body"
            widget: "markdown"
            modes: ["rich_text", "raw"]
            hint: "The two-column hero. Left column has the eyebrow, title, and tagline. Right column has the founder story paragraphs."

      - label: "What This Is"
        name: "home-what"
        file: "_src/pages/index/sections/02-what.md"
        fields:
          - label: "Content"
            name: "body"
            widget: "markdown"
            modes: ["rich_text", "raw"]
            hint: "The 'A room, not a program.' section."

      - label: "Outcomes Grid"
        name: "home-outcomes"
        file: "_src/pages/index/sections/03-outcomes.md"
        fields:
          - label: "Content"
            name: "body"
            widget: "markdown"
            modes: ["rich_text", "raw"]
            hint: "The six-item outcomes grid (Lightness, Clarity, etc.). Edit as raw HTML to change grid items."

      - label: "About / Identity Cost"
        name: "home-about"
        file: "_src/pages/index/sections/04-about.md"
        fields:
          - label: "Content"
            name: "body"
            widget: "markdown"
            modes: ["rich_text", "raw"]

      - label: "CTA — Express Interest"
        name: "home-cta"
        file: "_src/pages/index/sections/05-cta.md"
        fields:
          - label: "Content"
            name: "body"
            widget: "markdown"
            modes: ["rich_text", "raw"]
            hint: "The email signup section. The form itself is HTML — edit the heading and description text."

  # ─── ABOUT PAGE ───────────────────────────────────────────────────────────────
  - name: "about"
    label: "About Page"
    files:
      - label: "Hero"
        name: "about-hero"
        file: "_src/pages/about/sections/01-hero.md"
        fields:
          - label: "Content"
            name: "body"
            widget: "markdown"
            modes: ["rich_text", "raw"]

      - label: "Daniel's Story"
        name: "about-story"
        file: "_src/pages/about/sections/02-story.md"
        fields:
          - label: "Content"
            name: "body"
            widget: "markdown"
            modes: ["rich_text", "raw"]
            hint: "The two-column story section — 'In Daniel's words' (left) and 'Found Room' (right)."

      - label: "Pull Quote"
