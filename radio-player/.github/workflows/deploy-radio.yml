name: Deploy Radio Player to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['radio-player/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-radio
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: radio-player
        run: npm ci

      - name: Build
        working-directory: radio-player
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: radio-player/dist

      - id: deployment
        uses: actions/deploy-pages@v4
